name: Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rokit
        run: |
          VERSION=$(curl -sSfL https://api.github.com/repos/rojo-rbx/rokit/releases/latest | jq -r '.tag_name[1:]')
          curl --proto '=https' --tlsv1.2 -sSfL "https://github.com/rojo-rbx/rokit/releases/download/v${VERSION}/rokit-${VERSION}-linux-x86_64.zip" -o rokit.zip
          unzip rokit.zip rokit
          ./rokit self-install
          echo "$HOME/.rokit/bin" >> $GITHUB_PATH

      - name: Install tools
        run: rokit install --no-trust-check

      - name: Build
        run: rojo build default.project.json --output RollbackHitbox.rbxm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RollbackHitbox
          path: RollbackHitbox.rbxm

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: RollbackHitbox

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: RollbackHitbox.rbxm
          name: RollbackHitbox ${{ github.ref_name }}
